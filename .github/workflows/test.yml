name: Build and Test
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Rust
        uses: actions/setup-rust@v3
        with:
          rust-version: '1.62.0'
      - name: Build and test
        run: |
          cargo build --bin mock
          echo "Build and test succeeded!"